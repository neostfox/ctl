name: release

# Build the `ctl` binary for all supported platforms and publish a GitHub
# Release with the archives + checksums. Triggered by pushing a tag like
# `v0.0.1`, or manually via the Actions tab.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.0.1)"
        required: true

permissions:
  contents: write

jobs:
  # A release must never ship code that fails the correctness gate. This mirrors
  # ci.yml (fmt/check/clippy/test/architecture) so a tag build is self-contained
  # and does not depend on a separate workflow's status.
  verify:
    name: verify (fmt + check + clippy + test + architecture)
    runs-on: ubuntu-latest
    # Fail fast on a hang (e.g. a stuck gate-supervision test) instead of
    # burning the 6-hour default job timeout before a release can proceed.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy --no-self-update
          rustup default stable
      - name: Format
        run: cargo fmt --all -- --check
      - name: Check
        run: cargo check --locked --all-targets
      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked
      - name: Architecture check
        run: cargo run --locked --quiet -- architecture check

  build:
    name: build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # Both mac targets build on Apple Silicon runners; x86_64 is
          # cross-compiled (macOS SDK is universal). macos-13 Intel runners
          # are deprecated and can queue indefinitely.
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "VERSION=${REF#v}" >> "$GITHUB_ENV"

      - name: Verify tag matches Cargo.toml
        shell: bash
        run: |
          # Release integrity: the committed Cargo.toml version is the source of
          # truth and must equal the tag. This replaces the old runner-only
          # version stamp, which desynced Cargo.lock and blocked --locked builds.
          # `ctl --version` reads CARGO_PKG_VERSION, so a matching commit is what
          # makes the shipped binary report the released version.
          CARGO_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "Cargo.toml: $CARGO_VERSION    tag: $VERSION"
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "::error::tag v$VERSION does not match Cargo.toml version $CARGO_VERSION — bump Cargo.toml and commit before tagging"
            exit 1
          fi

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install aarch64 linux cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        # --locked: build from the exact committed Cargo.lock. Cargo.toml is no
        # longer edited on the runner (the tag now matches the committed version),
        # so the lock stays in sync and a drifted lock fails the release.
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          archive="ctl-${{ matrix.target }}.tar.gz"
          tar -czf "dist/$archive" -C "target/${{ matrix.target }}/release" ctl
          ( cd dist && shasum -a 256 "$archive" > "$archive.sha256" )

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          archive="ctl-${{ matrix.target }}.zip"
          7z a "dist/$archive" "./target/${{ matrix.target }}/release/ctl.exe" >/dev/null
          # sha256sum ships with Git Bash on the windows runner.
          ( cd dist && sha256sum "$archive" > "$archive.sha256" )

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ctl-${{ matrix.target }}
          path: dist/*

  release:
    name: publish release
    needs: [verify, build]
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true
          files: dist/*

  # Publish the ONE remaining npm package: the @velo-ai/omp plugin (pure
  # hooks + skills — the npm binary distribution was retired in B-lite; the
  # binary ships via the GitHub Release above and `cargo install`). The
  # committed npm-omp/package.json version is generated from Cargo.toml by
  # `ctl skills sync` and the tag is verified to equal Cargo.toml, so no
  # publish-time version stamping is needed.
  #
  # Auth is OIDC TRUSTED PUBLISHING — no NPM_TOKEN. The publish exchanges the
  # job's GitHub OIDC id-token for a short-lived npm credential and emits
  # provenance automatically. PREREQUISITE on npmjs.com: the package must
  # already exist AND have a trusted publisher configured for this repo +
  # workflow file (`release.yml`).
  npm-publish:
    name: publish @velo-ai/omp (hooks + skills)
    needs: [verify, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint the OIDC token npm exchanges for a publish credential
      contents: read
    steps:
      - uses: actions/checkout@v4

      # OIDC trusted publishing requires npm >= 11.5.1 on Node >= 22.14.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      # No NODE_AUTH_TOKEN: npm detects the GitHub OIDC environment (id-token:
      # write) and exchanges it for a short-lived publish credential.
      - name: Publish OMP plugin
        shell: bash
        run: cd npm-omp && npm publish --access public
