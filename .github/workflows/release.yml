name: release

# Build the `ctl` binary for all supported platforms and publish a GitHub
# Release with the archives + checksums. Triggered by pushing a tag like
# `v0.0.1`, or manually via the Actions tab.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.0.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # Both mac targets build on Apple Silicon runners; x86_64 is
          # cross-compiled (macOS SDK is universal). macos-13 Intel runners
          # are deprecated and can queue indefinitely.
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "VERSION=${REF#v}" >> "$GITHUB_ENV"

      - name: Stamp version into Cargo.toml
        shell: bash
        run: |
          # Ephemeral (runner-only): make `ctl --version` match the release tag.
          perl -i -pe 'if (!$done && /^version = /) { s/^version = ".*"/version = "'"$VERSION"'"/; $done=1 }' Cargo.toml
          grep -m1 '^version' Cargo.toml

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install aarch64 linux cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        # No --locked: the version-stamp step above edits Cargo.toml, which
        # would otherwise put Cargo.lock out of sync and fail --locked.
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          archive="ctl-${{ matrix.target }}.tar.gz"
          tar -czf "dist/$archive" -C "target/${{ matrix.target }}/release" ctl
          ( cd dist && shasum -a 256 "$archive" > "$archive.sha256" )

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          archive="ctl-${{ matrix.target }}.zip"
          7z a "dist/$archive" "./target/${{ matrix.target }}/release/ctl.exe" >/dev/null
          # sha256sum ships with Git Bash on the windows runner.
          ( cd dist && sha256sum "$archive" > "$archive.sha256" )

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ctl-${{ matrix.target }}
          path: dist/*

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true
          files: dist/*
