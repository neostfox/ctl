name: release

# Build the `ctl` binary for all supported platforms and publish a GitHub
# Release with the archives + checksums. Triggered by pushing a tag like
# `v0.0.1`, or manually via the Actions tab.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.0.1)"
        required: true

permissions:
  contents: write

jobs:
  # A release must never ship code that fails the correctness gate. This mirrors
  # ci.yml (fmt/check/clippy/test/architecture) so a tag build is self-contained
  # and does not depend on a separate workflow's status.
  verify:
    name: verify (fmt + check + clippy + test + architecture)
    runs-on: ubuntu-latest
    # Fail fast on a hang (e.g. a stuck gate-supervision test) instead of
    # burning the 6-hour default job timeout before a release can proceed.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy --no-self-update
          rustup default stable
      - name: Format
        run: cargo fmt --all -- --check
      - name: Check
        run: cargo check --locked --all-targets
      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked
      - name: Architecture check
        run: cargo run --locked --quiet -- architecture check

  build:
    name: build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # Both mac targets build on Apple Silicon runners; x86_64 is
          # cross-compiled (macOS SDK is universal). macos-13 Intel runners
          # are deprecated and can queue indefinitely.
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "VERSION=${REF#v}" >> "$GITHUB_ENV"

      - name: Verify tag matches Cargo.toml
        shell: bash
        run: |
          # Release integrity: the committed Cargo.toml version is the source of
          # truth and must equal the tag. This replaces the old runner-only
          # version stamp, which desynced Cargo.lock and blocked --locked builds.
          # `ctl --version` reads CARGO_PKG_VERSION, so a matching commit is what
          # makes the shipped binary report the released version.
          CARGO_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "Cargo.toml: $CARGO_VERSION    tag: $VERSION"
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "::error::tag v$VERSION does not match Cargo.toml version $CARGO_VERSION — bump Cargo.toml and commit before tagging"
            exit 1
          fi

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install aarch64 linux cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        # --locked: build from the exact committed Cargo.lock. Cargo.toml is no
        # longer edited on the runner (the tag now matches the committed version),
        # so the lock stays in sync and a drifted lock fails the release.
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          archive="ctl-${{ matrix.target }}.tar.gz"
          tar -czf "dist/$archive" -C "target/${{ matrix.target }}/release" ctl
          ( cd dist && shasum -a 256 "$archive" > "$archive.sha256" )

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          archive="ctl-${{ matrix.target }}.zip"
          7z a "dist/$archive" "./target/${{ matrix.target }}/release/ctl.exe" >/dev/null
          # sha256sum ships with Git Bash on the windows runner.
          ( cd dist && sha256sum "$archive" > "$archive.sha256" )

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ctl-${{ matrix.target }}
          path: dist/*

  release:
    name: publish release
    needs: [verify, build]
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true
          files: dist/*

  # Publish the npm packages under the @velo-ai org: the five platform binary
  # packages, the @velo-ai/ctl meta-package (which bundles every platform binary
  # under platforms/ — that is what bin/ctl.js resolves), and the @velo-ai/omp
  # OMP plugin. Requires the NPM_TOKEN secret (an npm automation token with
  # publish rights on the @velo-ai org). Versions are stamped to the release tag
  # at publish time, so the committed package.json versions need not be bumped
  # per release (they still track Cargo.toml via the generator's drift check).
  npm-publish:
    name: publish npm packages (@velo-ai)
    needs: [verify, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve release version
        shell: bash
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "VERSION=${REF#v}" >> "$GITHUB_ENV"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Stage binaries into platform packages
        shell: bash
        run: |
          set -euo pipefail
          # build matrix target -> "<platform package dir> <binary name>"
          declare -A MAP=(
            [x86_64-unknown-linux-gnu]="linux-x64-gnu ctl"
            [aarch64-unknown-linux-gnu]="linux-arm64-gnu ctl"
            [x86_64-apple-darwin]="darwin-x64 ctl"
            [aarch64-apple-darwin]="darwin-arm64 ctl"
            [x86_64-pc-windows-msvc]="win32-x64-msvc ctl.exe"
          )
          for target in "${!MAP[@]}"; do
            read -r dir bin <<< "${MAP[$target]}"
            dest="npm/platforms/$dir"
            if [ "$bin" = "ctl.exe" ]; then
              unzip -o "artifacts/ctl-$target.zip" ctl.exe -d "$dest"
            else
              tar -xzf "artifacts/ctl-$target.tar.gz" -C "$dest" ctl
              chmod +x "$dest/ctl"
            fi
          done

      - name: Stamp versions to the release tag
        shell: bash
        run: |
          set -euo pipefail
          node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            const setv = (f, fn) => {
              const p = JSON.parse(fs.readFileSync(f, "utf8"));
              p.version = v;
              if (fn) fn(p);
              fs.writeFileSync(f, JSON.stringify(p, null, 2) + "\n");
            };
            for (const d of ["win32-x64-msvc","darwin-x64","darwin-arm64","linux-x64-gnu","linux-arm64-gnu"])
              setv(`npm/platforms/${d}/package.json`);
            setv("npm/package.json", p => {
              for (const k of Object.keys(p.optionalDependencies || {})) p.optionalDependencies[k] = v;
            });
            setv("npm-omp/package.json", p => {
              for (const k of Object.keys(p.dependencies || {})) p.dependencies[k] = v;
            });
          '

      - name: Publish platform packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for dir in win32-x64-msvc darwin-x64 darwin-arm64 linux-x64-gnu linux-arm64-gnu; do
            ( cd "npm/platforms/$dir" && npm publish --access public )
          done

      - name: Publish meta package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm && npm publish --access public

      - name: Publish OMP plugin
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm-omp && npm publish --access public
